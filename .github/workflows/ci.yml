name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Check Lua syntax
        run: |
          set -euo pipefail

          while IFS= read -r lua_file; do
            echo "Checking $lua_file"
            luac5.1 -p "$lua_file"
          done < <(find . -type f -name '*.lua' -not -path './.git/*' | sort)

      - name: Verify addon zips are clean
        run: |
          set -euo pipefail

          test -d builds
          test -n "$(find builds -maxdepth 1 -name '*.zip' -print -quit)"

          for zip_file in builds/*.zip; do
            echo "Checking $zip_file"
            unzip -t "$zip_file"

            if unzip -Z1 "$zip_file" | grep -E '(^|/)(__MACOSX|\.DS_Store|\.Spotlight-V100|\.TemporaryItems|\.Trashes|\.fseventsd|\.git|\.gitignore|\._.*)$'; then
              echo "Dirty macOS/system file found in $zip_file"
              exit 1
            fi
          done
